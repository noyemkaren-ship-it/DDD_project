<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мой счёт | Giga Bank</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            background: white;
            border-radius: 28px;
            padding: 25px 30px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .user-info h1 {
            color: #1e3c72;
            margin-bottom: 5px;
        }
        .user-info p {
            color: #5a6e8a;
        }
        .balance-card {
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 30px;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .balance-label {
            font-size: 1rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }
        .balance-amount {
            font-size: 3rem;
            font-weight: 700;
        }
        .balance-currency {
            font-size: 1.5rem;
            margin-left: 5px;
        }
        .actions {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
            max-width: 300px;
            margin-left: auto;
            margin-right: auto;
        }
        .action-btn {
            background: white;
            border: none;
            padding: 15px;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: #1e3c72;
        }
        .action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .action-btn:active {
            transform: translateY(0);
        }
        .transactions {
            background: white;
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .transactions h3 {
            color: #1e3c72;
            margin-bottom: 20px;
        }
        .transaction-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }
        .transaction-positive {
            color: #2ecc71;
        }
        .transaction-negative {
            color: #e74c3c;
        }
        .transaction-date {
            color: #8a9bb0;
            font-size: 0.8rem;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            padding: 10px 20px;
            background: #1e3c72;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 60, 114, 0.3);
        }
        .logout-btn {
            background: #e74c3c;
        }
        .logout-btn:hover {
            background: #c0392b;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #8a9bb0;
        }
        .error-message {
            background: #ffe3e3;
            color: #c0392b;
            padding: 12px 16px;
            border-radius: 16px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        @media (max-width: 600px) {
            .balance-amount { font-size: 2rem; }
            .actions { grid-template-columns: 1fr; }
            .header { flex-direction: column; text-align: center; }
            .nav-buttons { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user-info">
                <h1>🏦 Giga Bank</h1>
                <p>Добро пожаловать, {{ username }}</p>
            </div>
            <div class="nav-buttons">
                <a href="/profile/{{ username }}/transfers" class="nav-btn">💰 Переводы</a>
                <a href="/logout" class="nav-btn logout-btn">🚪 Выйти</a>
            </div>
        </div>

        <div id="errorMessage" class="error-message"></div>

        <div class="balance-card">
            <div class="balance-label">Текущий баланс</div>
            <div class="balance-amount">
                <span id="balance">0</span>
                <span class="balance-currency">₽</span>
            </div>
        </div>

        <div class="actions">
            <button class="action-btn" onclick="showTransfer()">🔄 Перевести</button>
        </div>

        <div class="transactions">
            <h3>📋 История операций</h3>
            <div id="transactions-list">
                <div class="loading">Загрузка...</div>
            </div>
        </div>
    </div>

    <script>
        const username = '{{ username }}';

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 3000);
        }

        async function loadBalance() {
            try {
                const res = await fetch(`/api/users/${username}/balance`);
                if (!res.ok) throw new Error('Ошибка загрузки баланса');
                const data = await res.json();
                document.getElementById('balance').textContent = data.balance;
            } catch (err) {
                console.error(err);
                showError('Не удалось загрузить баланс');
            }
        }

        async function loadTransactions() {
            const container = document.getElementById('transactions-list');
            try {
                const res = await fetch(`/api/users/${username}/transactions`);
                if (!res.ok) throw new Error('Ошибка загрузки истории');
                const transactions = await res.json();

                if (transactions && transactions.length > 0) {
                    container.innerHTML = transactions.map(t => `
                        <div class="transaction-item">
                            <div>
                                <div>${t.description || t.type}</div>
                                <div class="transaction-date">${t.date || new Date().toLocaleString()}</div>
                            </div>
                            <div class="${t.amount > 0 ? 'transaction-positive' : 'transaction-negative'}">
                                ${t.amount > 0 ? '+' : ''}${t.amount} ₽
                            </div>
                        </div>
                    `).join('');
                } else {
                    container.innerHTML = '<div class="loading">Нет операций</div>';
                }
            } catch (err) {
                console.error(err);
                container.innerHTML = '<div class="loading">Ошибка загрузки истории</div>';
            }
        }

        async function showTransfer() {
            const to = prompt('Кому перевести (username):');
            if (!to) return;

            const amount = prompt('Сумма перевода (₽):');
            if (!amount) return;

            const amountNum = parseInt(amount);
            if (isNaN(amountNum) || amountNum <= 0) {
                showError('Введите корректную сумму');
                return;
            }

            try {
                const res = await fetch('/api/transfer', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ from: username, to, amount: amountNum })
                });

                const data = await res.json();

                if (res.ok && data.success !== false) {
                    showError('Перевод выполнен успешно!');
                    loadBalance();
                    loadTransactions();
                } else {
                    showError(data.text || data.message || 'Ошибка перевода');
                }
            } catch (err) {
                console.error(err);
                showError('Ошибка соединения');
            }
        }

        loadBalance();
        loadTransactions();
    </script>
</body>
</html>
